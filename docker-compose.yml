services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-dev}
    container_name: starship-hud-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/starship.db
      - CORS_ORIGINS=["*"]
      - SEED_DEMO_SHIP=${SEED_DEMO_SHIP:-true}
      # Authentication
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - SECRET_KEY=${SECRET_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SESSION_LIFETIME_DAYS=${SESSION_LIFETIME_DAYS:-30}
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    ports:
      - "${DOCKER_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - starship-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_VERSION=${APP_VERSION:-dev}
    container_name: starship-hud-frontend
    restart: unless-stopped
    ports:
      - "${DOCKER_FRONTEND_PORT:-7891}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - starship-net

networks:
  starship-net:
    name: starship-hud-network
    driver: bridge

